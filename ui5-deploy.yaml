# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: smartwarehouse
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://s40lp1.ucc.cit.tum.de
          client: '324'
        app:
          name: Z_UI5_SMARTWH
          description: Smart Warehouse UI5 App
          package: ZPKG_WH_ODATA
          transport: S40K915953
        exclude:
          - /test/
